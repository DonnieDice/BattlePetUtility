name: Package and Release

on:
  push:
    tags:
      - "v*"
    branches:
      - alpha
      - dev

env:
  CF_API_KEY: ${{ secrets.CF_API_KEY }}
  WOWI_API_TOKEN: ${{ secrets.WOWI_API_TOKEN }}
  GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Clone project
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git user
        run: |
          git config --global user.name "donniedice"
          git config --global user.email "donniedice@protonmail.com"

      - name: Determine release type
        id: release_type
        shell: bash
        run: |
          ref="${GITHUB_REF#refs/*/}"
          if [[ "$ref" == *"beta"* ]]; then
            echo "type=beta" >> "$GITHUB_OUTPUT"
          elif [[ "$ref" == *"alpha"* ]] || [[ "$GITHUB_REF" == "refs/heads/alpha" ]]; then
            echo "type=alpha" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF" == "refs/heads/dev" ]]; then
            echo "type=alpha" >> "$GITHUB_OUTPUT"
          else
            echo "type=release" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract version from TOC
        id: version
        shell: bash
        run: |
          version="$(grep -oP '^## Version:\s*\K(.*)' BetterPetBuddy.toc)"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Validate tagged release version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          toc_version="${{ steps.version.outputs.version }}"
          if [[ -z "$toc_version" ]]; then
            echo "::error::Could not read version from BetterPetBuddy.toc"
            exit 1
          fi
          if [[ "$tag" != "$toc_version" ]]; then
            echo "::error::Tag '$tag' does not match TOC version '$toc_version'"
            exit 1
          fi

      - name: Package and release
        uses: BigWigsMods/packager@master
        with:
          release-type: ${{ steps.release_type.outputs.type }}

