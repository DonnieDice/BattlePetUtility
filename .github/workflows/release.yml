name: Package and Release
on:
  push:
    tags:
      - 'v*'
    branches:
      - alpha
      - main
      - master
  workflow_dispatch:
    inputs:
      release_type:
        description: Release channel to publish/notify
        required: true
        default: release
        type: choice
        options:
          - release
          - beta
          - alpha
      tag_name:
        description: Tag name to use in release links and notifications
        required: false
        default: v2.0.1
        type: string

permissions:
  contents: write

env:
  CF_API_KEY: ${{ secrets.CF_API_KEY }}
  WOWI_API_TOKEN: ${{ secrets.WOWI_API_TOKEN }}
  WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}
  GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Project
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Configure Git user
        run: |
          git config --global user.name "donniedice"
          git config --global user.email "donniedice@protonmail.com"
      - name: Determine Release Type
        id: set_release_type
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "release_type=${{ inputs.release_type }}" >> $GITHUB_OUTPUT
            echo "tag_name=${{ inputs.tag_name }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG_NAME="${{ github.ref_name }}"
            if [[ "$TAG_NAME" == *"beta"* ]]; then
              echo "release_type=beta" >> $GITHUB_OUTPUT
            elif [[ "$TAG_NAME" == *"alpha"* ]]; then
              echo "release_type=alpha" >> $GITHUB_OUTPUT
            else
              echo "release_type=release" >> $GITHUB_OUTPUT
            fi
          elif [[ "${{ github.ref }}" == "refs/heads/alpha" ]]; then
            echo "release_type=alpha" >> $GITHUB_OUTPUT
          else
            echo "release_type=none" >> $GITHUB_OUTPUT
            echo "tag_name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi
      - name: Extract Version from TOC
        id: extract_version
        run: |
          if [ -f "PetBuddy2.toc" ]; then
            version=$(grep -oP '^## Version: \K(.*)' PetBuddy2.toc || echo "unknown")
          else
            version="${{ github.ref_name }}"
          fi
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%S.000Z)" >> $GITHUB_OUTPUT
      - name: Extract Changelog
        id: extract_changelog
        run: |
          if [ -f "docs/CHANGES.md" ]; then
            CHANGELOG=$(cat docs/CHANGES.md | head -50 | jq -Rs '.')
            CHANGELOG=${CHANGELOG:1:-1}
            echo "changelog<<EOF" >> $GITHUB_OUTPUT
            echo "$CHANGELOG" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "changelog=Check the commit history for changes" >> $GITHUB_OUTPUT
          fi
      - name: Package Addon
        uses: BigWigsMods/packager@master
        if: steps.set_release_type.outputs.release_type != 'none'
      - name: Send Discord Release Notification
        if: success() && steps.set_release_type.outputs.release_type == 'release'
        uses: actions/github-script@v7
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          VERSION: ${{ steps.extract_version.outputs.version }}
          TAG_NAME: ${{ steps.set_release_type.outputs.tag_name }}
          TIMESTAMP: ${{ steps.extract_version.outputs.timestamp }}
          CHANGELOG: ${{ steps.extract_changelog.outputs.changelog }}
        with:
          script: |
            if (!process.env.DISCORD_WEBHOOK) {
              throw new Error('DISCORD_WEBHOOK secret is not configured.');
            }
            let changelog = process.env.CHANGELOG || 'Check the commit history for changes';
            changelog = changelog.replace(/\\n/g, '\n');
            if (changelog.length > 3500) {
              changelog = changelog.slice(0, 3497) + '...';
            }

            const payload = {
              "username": "PetBuddy2 Update",
              "embeds": [{
                "title": `🐾 PetBuddy2 - ${process.env.VERSION}`,
                "description": `**Battle pet HUD + utility panel**\nA fresh PetBuddy2 build is now live!\n\n**Highlights:**\n${changelog}`,
                "url": `https://github.com/DonnieDice/PetBuddy2/releases/tag/${process.env.TAG_NAME}`,
                "color": 5793266,
                "fields": [
                  {
                    "name": "📥 Downloads",
                    "value": "[CurseForge](https://www.curseforge.com/wow/addons/petbuddy2)\n[GitHub Releases](https://github.com/DonnieDice/PetBuddy2/releases)",
                    "inline": true
                  },
                  {
                    "name": "🎮 Compatibility",
                    "value": "Retail Midnight",
                    "inline": true
                  },
                  {
                    "name": "💬 Support",
                    "value": "[Discord](https://discord.gg/rgxmods)\n[Report Issues](https://github.com/DonnieDice/PetBuddy2/issues)",
                    "inline": true
                  }
                ],
                "footer": {
                  "text": "RGX Mods - RealmGX Community",
                  "icon_url": "https://raw.githubusercontent.com/donniedice/SimpleQuestPlates/main/images/kiwi.gif"
                },
                "timestamp": process.env.TIMESTAMP
              }]
            };
            const response = await fetch(process.env.DISCORD_WEBHOOK, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json'
              },
              body: JSON.stringify(payload)
            });
            const responseText = await response.text();
            if (!response.ok) {
              throw new Error(`Discord notification failed: ${response.status} ${response.statusText} ${responseText}`);
            }
            console.log(`Discord notification sent. Status: ${response.status}`);
      - name: Send Discord Beta Notification
        if: success() && steps.set_release_type.outputs.release_type == 'beta'
        uses: actions/github-script@v7
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          VERSION: ${{ steps.extract_version.outputs.version }}
          TIMESTAMP: ${{ steps.extract_version.outputs.timestamp }}
          CHANGELOG: ${{ steps.extract_changelog.outputs.changelog }}
        with:
          script: |
            if (!process.env.DISCORD_WEBHOOK) {
              throw new Error('DISCORD_WEBHOOK secret is not configured.');
            }
            let changelog = process.env.CHANGELOG || 'Check the commit history for changes';
            changelog = changelog.replace(/\\n/g, '\n');
            if (changelog.length > 3500) {
              changelog = changelog.slice(0, 3497) + '...';
            }

            const payload = {
              "username": "PetBuddy2 Beta",
              "embeds": [{
                "title": `🧪 PetBuddy2 Beta - ${process.env.VERSION}`,
                "description": `A beta build of PetBuddy2 is ready for testing.\n\n**What's New:**\n${changelog}`,
                "color": 15695661,
                "fields": [
                  {
                    "name": "📥 Download Beta",
                    "value": "[CurseForge](https://www.curseforge.com/wow/addons/petbuddy2)\n[GitHub Releases](https://github.com/DonnieDice/PetBuddy2/releases)"
                  }
                ],
                "footer": {
                  "text": "RGX Mods - Beta Build",
                  "icon_url": "https://raw.githubusercontent.com/donniedice/SimpleQuestPlates/main/images/kiwi.gif"
                },
                "timestamp": process.env.TIMESTAMP
              }]
            };
            const response = await fetch(process.env.DISCORD_WEBHOOK, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json'
              },
              body: JSON.stringify(payload)
            });
            const responseText = await response.text();
            if (!response.ok) {
              throw new Error(`Discord notification failed: ${response.status} ${response.statusText} ${responseText}`);
            }
            console.log(`Discord notification sent. Status: ${response.status}`);
      - name: Send Discord Alpha Notification
        if: success() && steps.set_release_type.outputs.release_type == 'alpha'
        uses: actions/github-script@v7
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          VERSION: ${{ steps.extract_version.outputs.version }}
          TIMESTAMP: ${{ steps.extract_version.outputs.timestamp }}
          CHANGELOG: ${{ steps.extract_changelog.outputs.changelog }}
        with:
          script: |
            if (!process.env.DISCORD_WEBHOOK) {
              throw new Error('DISCORD_WEBHOOK secret is not configured.');
            }
            let changelog = process.env.CHANGELOG || 'Check the commit history for changes';
            changelog = changelog.replace(/\\n/g, '\n');
            if (changelog.length > 3500) {
              changelog = changelog.slice(0, 3497) + '...';
            }

            const payload = {
              "username": "PetBuddy2 Alpha",
              "embeds": [{
                "title": `🔬 PetBuddy2 Alpha - ${process.env.VERSION}`,
                "description": `Development snapshot for internal testing.\n\n**What's New:**\n${changelog}`,
                "color": 14696959,
                "footer": {
                  "text": "RGX Mods - Alpha Build",
                  "icon_url": "https://raw.githubusercontent.com/donniedice/SimpleQuestPlates/main/images/kiwi.gif"
                },
                "timestamp": process.env.TIMESTAMP
              }]
            };
            const response = await fetch(process.env.DISCORD_WEBHOOK, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json'
              },
              body: JSON.stringify(payload)
            });
            const responseText = await response.text();
            if (!response.ok) {
              throw new Error(`Discord notification failed: ${response.status} ${response.statusText} ${responseText}`);
            }
            console.log(`Discord notification sent. Status: ${response.status}`);
      - name: Send Discord Failure Notification
        if: failure()
        uses: actions/github-script@v7
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          VERSION: ${{ steps.extract_version.outputs.version }}
          TIMESTAMP: ${{ steps.extract_version.outputs.timestamp }}
          RUN_ID: ${{ github.run_id }}
        with:
          script: |
            if (!process.env.DISCORD_WEBHOOK) {
              throw new Error('DISCORD_WEBHOOK secret is not configured.');
            }

            const payload = {
              "username": "PetBuddy2 Build Failed",
              "embeds": [{
                "title": "❌ PetBuddy2 Build Failed",
                "description": "The release workflow encountered an error",
                "url": `https://github.com/DonnieDice/PetBuddy2/actions/runs/${process.env.RUN_ID}`,
                "color": 15158332,
                "fields": [
                  {
                    "name": "Version",
                    "value": process.env.VERSION || 'Unknown',
                    "inline": true
                  },
                  {
                    "name": "Workflow",
                    "value": `[View Logs](https://github.com/DonnieDice/PetBuddy2/actions/runs/${process.env.RUN_ID})`,
                    "inline": true
                  }
                ],
                "footer": {
                  "text": "RGX Mods - Build System",
                  "icon_url": "https://raw.githubusercontent.com/donniedice/SimpleQuestPlates/main/images/kiwi.gif"
                },
                "timestamp": process.env.TIMESTAMP
              }]
            };
            const response = await fetch(process.env.DISCORD_WEBHOOK, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json'
              },
              body: JSON.stringify(payload)
            });
            const responseText = await response.text();
            if (!response.ok) {
              throw new Error(`Discord notification failed: ${response.status} ${response.statusText} ${responseText}`);
            }
            console.log(`Discord notification sent. Status: ${response.status}`);
